name: Build DXT (manual)

on:
  workflow_dispatch:

permissions: {}

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack DXT
        run: npx --yes @anthropic-ai/dxt@0.2.6 pack

      - name: Compute version and rename artifact
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          FILE=$(ls -1 *.dxt | head -n1)
          mv "$FILE" "fastmail-mcp-$VERSION.dxt"
          echo "DXT_FILE=fastmail-mcp-$VERSION.dxt" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fastmail-mcp-dxt
          path: ${{ env.DXT_FILE }}

name: Release Please

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: google-github-actions/release-please-action@a017ec70c7f1401744d60197f7577a0c51c8c1cf # v4
        id: release
        with:
          release-type: node

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 22
          cache: npm

      - name: Install and verify
        if: ${{ steps.release.outputs.release_created }}
        run: |
          npm ci
          npm run check
          npm test
          npm run build

      - name: Pack DXT
        if: ${{ steps.release.outputs.release_created }}
        run: npx --yes @anthropic-ai/dxt@0.2.6 pack

      - name: Upload DXT to release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          FILE=$(ls -1 *.dxt | head -n1)
          mv "$FILE" "fastmail-mcp-$VERSION.dxt"
          gh release upload "$TAG" "fastmail-mcp-$VERSION.dxt"
